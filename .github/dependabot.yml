version: 2

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: daily
      time: "07:00"
      timezone: Europe/London
    ignore:
      - dependency-name: '@types/node'
        update-types: [ 'version-update:semver-major' ]
    groups:
      github:
        patterns:
          - "@actions/*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "07:00"
      timezone: Europe/London
    groups:
      github:
        patterns:
          - "actions/*"
